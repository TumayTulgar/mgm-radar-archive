name: MGM Radar Archiver

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch:

jobs:
  archive-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Radar Görselini Çek
        run: python fetch_radar.py

      - name: Otomatik Commit ve Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: radar görseli eklendi"
          file_pattern: "images/*"
