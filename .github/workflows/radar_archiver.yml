name: MGM Radar Archiver

on:
  repository_dispatch:
    types: [trigger-radar]
  workflow_dispatch:

jobs:
  archive-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Tüm Geçmişiyle Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Ortamını Hazırla
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Radar Görsellerini Çek
        run: python fetch_radar.py

      - name: Git Kimliğini Tanımla ve Uzak Depoyla Senkronize Et
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || echo "Senkronizasyon adımı tamamlandı veya çakışma yok."

      - name: Otomatik Commit ve Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: radar görseli eklendi"
          file_pattern: "images/*"
          skip_ci: true
          push_options: '--force-with-lease'
